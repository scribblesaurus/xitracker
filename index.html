<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Exo+2:wght@400;500;600;700&display=swap');
:root{
  --bg-deep:#0a0c10;--bg-panel:#0f1218;--bg-card:#141820;--bg-hover:#1c2230;
  --border:#1e2535;--border-bright:#2a3550;
  --gold:#c8a84b;--gold-dim:#7a6430;--gold-glow:rgba(200,168,75,0.15);
  --cyan:#4ab8c8;--cyan-dim:#2a6878;--green:#4ac88a;--green-dim:#2a6845;
  --red:#c84a4a;--red-dim:#7a2a2a;--purple:#8a4ac8;--orange:#e8853a;
  --text-primary:#f0e8d8;--text-secondary:#90a8c0;--text-muted:#556070;
}
.theme-midnight{
  --bg-deep:#050810;--bg-panel:#080d18;--bg-card:#0c1220;--bg-hover:#101828;
  --border:#162030;--border-bright:#203050;
  --gold:#60c8f0;--gold-dim:#2a6890;--gold-glow:rgba(96,200,240,0.15);
  --text-primary:#ffffff;--text-secondary:#a0c0e0;--text-muted:#506080;
}
.theme-parchment{
  --bg-deep:#f5f0e8;--bg-panel:#ede8dc;--bg-card:#e5dfd0;--bg-hover:#ddd8c8;
  --border:#c8c0a8;--border-bright:#b0a890;
  --gold:#7a4a10;--gold-dim:#a06820;--gold-glow:rgba(122,74,16,0.12);
  --cyan:#2a6878;--cyan-dim:#4a90a8;--green:#2a6838;--green-dim:#4a9060;
  --red:#883020;--red-dim:#b05030;--orange:#a05018;
  --text-primary:#2a2018;--text-secondary:#5a4830;--text-muted:#8a7860;
}
.theme-teal{
  --bg-deep:#060d0c;--bg-panel:#0a1512;--bg-card:#0e1c18;--bg-hover:#122420;
  --border:#163028;--border-bright:#204838;
  --gold:#40d8a8;--gold-dim:#207850;--gold-glow:rgba(64,216,168,0.15);
  --cyan:#60e8c0;--cyan-dim:#308860;--green:#80f0a0;--green-dim:#3a8050;

}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Exo 2',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;font-size:16px;line-height:1.5;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,168,75,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.theme-parchment body::before{background-image:linear-gradient(rgba(122,74,16,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(122,74,16,0.03) 1px,transparent 1px);}
.app{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 20px 70px;}
.header{padding:24px 0 18px;border-bottom:1px solid var(--border);margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.header-left h1{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-shadow:0 0 30px var(--gold-glow);}
.header-left p{font-size:13px;color:var(--text-muted);letter-spacing:.05em;margin-top:2px;}
.theme-switcher{display:flex;gap:6px;align-items:center;}
.theme-label{font-size:11px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-right:4px;}
.theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
.theme-btn:hover{transform:scale(1.15);}
.theme-btn.active{border-color:var(--text-primary);}
.theme-dark{background:linear-gradient(135deg,#0a0c10 50%,#c8a84b 50%);}
.theme-mid{background:linear-gradient(135deg,#080d18 50%,#60c8f0 50%);}
.theme-parch{background:linear-gradient(135deg,#f5f0e8 50%,#7a4a10 50%);}
.theme-tl{background:linear-gradient(135deg,#060d0c 50%,#40d8a8 50%);}
.nav-tabs{display:flex;gap:2px;margin-bottom:22px;border-bottom:2px solid var(--border);flex-wrap:wrap;}
.nav-tab{padding:10px 18px;font-family:'Exo 2',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--text-secondary);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;margin-bottom:-2px;}
.nav-tab:hover{color:var(--text-primary);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-tab.disabled{opacity:.4;cursor:not-allowed;}
.nav-tab.urgent{color:var(--red)!important;border-bottom-color:var(--red)!important;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:1000px){.grid-2{grid-template-columns:1fr;}}
.section-gap{margin-bottom:16px;}
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;padding:18px;}
.panel-title{font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent);}
.bar-track{height:7px;background:var(--bg-card);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.bar-orange{background:linear-gradient(90deg,var(--gold-dim),var(--orange));}
.bar-cyan{background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));}
.bar-green{background:linear-gradient(90deg,var(--green-dim),var(--green));}
.bar-purple{background:linear-gradient(90deg,#5a3080,var(--purple));}
.bar-gold{background:linear-gradient(90deg,var(--gold-dim),var(--gold));}
.bar-gil{background:linear-gradient(90deg,#5a4010,#e8c040);}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:12px 14px;}
.stat-label{font-size:11px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.stat-value{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);font-weight:600;line-height:1.2;}
.stat-value.cyan{color:var(--cyan);}.stat-value.green{color:var(--green);}.stat-value.orange{color:var(--orange);}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.bl{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px;}
.check-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .2s;user-select:none;}
.check-item:hover{border-color:var(--border-bright);background:var(--bg-hover);}
.check-item.done{opacity:.35;}
.check-item.done .check-name{text-decoration:line-through;color:var(--text-muted);}
.checkbox{width:17px;height:17px;border-radius:2px;border:1px solid var(--border-bright);background:var(--bg-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.checkbox.checked{background:var(--green);border-color:var(--green);}
.check-name{flex:1;font-size:14px;font-weight:500;}
.check-note{font-size:12px;color:var(--text-muted);}
.check-source{font-size:11px;color:var(--text-muted);background:var(--bg-deep);border-radius:2px;padding:1px 6px;border:1px solid var(--border);white-space:nowrap;}
.check-jobs{font-size:10px;color:var(--cyan);background:rgba(74,184,200,.08);border:1px solid var(--cyan-dim);border-radius:2px;padding:1px 6px;white-space:nowrap;flex-shrink:0;}
.tier-badge{font-size:9px;padding:2px 5px;border-radius:2px;font-weight:700;letter-spacing:.06em;border:1px solid;flex-shrink:0;}
.tier-beginner{background:rgba(74,200,138,.1);border-color:var(--green-dim);color:var(--green);}
.tier-mid{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);color:var(--cyan);}
.tier-max{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.tier-luopan{background:rgba(138,74,200,.1);border-color:#5a3080;color:#a870e8;}
.tier-event{background:rgba(232,133,58,.1);border-color:#804a20;color:var(--orange);}
.tier-shared{background:rgba(74,184,200,.08);border-color:var(--cyan-dim);color:var(--cyan);}
.sub-tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sub-tab{padding:7px 16px;font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.sub-tab:hover{color:var(--text-primary);}
.sub-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.spell-section-label{font-size:10px;letter-spacing:.14em;color:var(--text-muted);text-transform:uppercase;margin:12px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.spell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px;}
.spell-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.spell-item:hover{border-color:var(--border-bright);}
.spell-item.owned{opacity:.35;}
.spell-item.owned .spell-name{text-decoration:line-through;color:var(--text-muted);}
.spell-dot{width:8px;height:8px;border-radius:50%;border:1px solid;flex-shrink:0;}
.spell-name{flex:1;font-size:13px;font-weight:500;}
.spell-lvl{font-size:11px;color:var(--text-muted);white-space:nowrap;}
.imp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.imp-cell{aspect-ratio:1;border:1px solid var(--border);border-radius:3px;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.imp-cell.available{background:rgba(74,184,200,.15);border-color:var(--cyan);color:var(--cyan);}
.imp-cell.spent{background:rgba(200,74,74,.1);border-color:#603030;color:#804040;}
.coal-table{width:100%;border-collapse:collapse;font-size:13px;}
.coal-table th{text-align:left;padding:8px 10px;font-size:11px;letter-spacing:.1em;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;font-weight:700;}
.coal-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.coal-table tr:last-child td{border-bottom:none;}
.coal-table tr:hover td{background:var(--bg-hover);}
.rank-select{background:var(--bg-card);border:1px solid var(--border-bright);color:var(--text-primary);border-radius:2px;padding:3px 7px;font-family:'Exo 2',sans-serif;font-size:13px;cursor:pointer;}
.rank-pip{width:12px;height:12px;border-radius:50%;border:1px solid var(--border);background:var(--bg-deep);display:inline-block;margin-right:2px;}
.rank-pip.filled{background:var(--gold);border-color:var(--gold);}
.rank-pip.legend{background:var(--orange);border-color:var(--orange);}
.itin-block{margin-bottom:14px;}
.itin-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.itin-time{font-family:'Cinzel',serif;font-size:11px;color:var(--orange);letter-spacing:.1em;min-width:100px;font-weight:600;}
.itin-title{font-size:14px;font-weight:700;color:var(--text-primary);}
.itin-where{font-size:11px;color:var(--cyan);background:rgba(74,184,200,.08);border:1px solid var(--cyan-dim);border-radius:2px;padding:1px 7px;}
.itin-tasks{display:flex;flex-direction:column;gap:4px;padding-left:110px;}
@media(max-width:700px){.itin-tasks{padding-left:0;}}
.itin-task{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;user-select:none;transition:all .15s;}
.itin-task:hover{border-color:var(--border-bright);}
.itin-task.done .itin-task-text{text-decoration:line-through;color:var(--text-muted);}
.itin-task-text{flex:1;font-size:13px;}
.itin-priority{font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid;font-weight:700;letter-spacing:.06em;flex-shrink:0;}
.p-must{background:rgba(200,74,74,.15);border-color:#803030;color:#e87070;}
.p-should{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.p-can{background:rgba(74,85,104,.2);border-color:var(--border);color:var(--text-muted);}
.num-input{width:110px;background:var(--bg-card);border:1px solid var(--border-bright);color:var(--text-primary);border-radius:2px;padding:4px 8px;font-family:'Exo 2',sans-serif;font-size:14px;text-align:right;}
.num-input:focus{outline:none;border-color:var(--gold-dim);}
.date-input{background:var(--bg-card);border:1px solid var(--border-bright);border-radius:2px;color:var(--text-primary);padding:4px 8px;font-family:'Exo 2',sans-serif;font-size:13px;}
.date-input:focus{outline:none;border-color:var(--gold-dim);}
.num-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
.num-label{font-size:13px;color:var(--text-secondary);flex:1;}
.num-target{font-size:12px;color:var(--text-muted);}
.scroll-list{max-height:400px;overflow-y:auto;padding-right:4px;}
.scroll-list::-webkit-scrollbar{width:3px;}
.scroll-list::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:2px;padding:4px 10px;font-family:'Exo 2',sans-serif;font-size:11px;letter-spacing:.08em;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.btn-ghost:hover{border-color:var(--border-bright);color:var(--text-secondary);}
.save-bar{position:fixed;bottom:12px;right:12px;display:flex;gap:8px;align-items:center;background:var(--bg-panel);border:1px solid var(--border-bright);border-radius:4px;padding:7px 12px;z-index:100;font-size:12px;color:var(--text-muted);}
.save-btn{background:var(--gold-dim);border:none;color:#fff;border-radius:2px;padding:4px 12px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;cursor:pointer;text-transform:uppercase;transition:background .15s;}
.save-btn:hover{background:var(--gold);}
.save-status{color:var(--green);font-size:11px;}
.text-dim{color:var(--text-muted);font-size:12px;}
.flex-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tag-cs{font-size:9px;padding:1px 6px;border-radius:2px;background:rgba(74,85,104,.3);border:1px solid var(--border);color:var(--text-muted);letter-spacing:.06em;}
.event-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;}
.event-card.urgent{border-color:var(--red-dim);}
.event-card.active{border-color:var(--cyan-dim);}
.event-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.event-name{font-size:15px;font-weight:700;color:var(--text-primary);}
.event-countdown{font-family:'Cinzel',serif;font-size:12px;padding:3px 10px;border-radius:2px;border:1px solid;font-weight:700;}
.event-countdown.urgent{background:rgba(200,74,74,.15);border-color:var(--red-dim);color:var(--red);}
.event-countdown.soon{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.event-countdown.ok{background:rgba(74,184,200,.08);border-color:var(--cyan-dim);color:var(--cyan);}
.event-desc{font-size:13px;color:var(--text-secondary);margin-bottom:10px;line-height:1.5;}
.event-rec{font-size:12px;color:var(--orange);background:rgba(232,133,58,.08);border:1px solid rgba(232,133,58,.2);border-radius:2px;padding:5px 9px;margin-bottom:10px;}
.event-tasks{display:flex;flex-direction:column;gap:4px;}
.checklist{display:flex;flex-direction:column;gap:5px;}
.daily-check{width:14px;height:14px;border-radius:50%;border:1px solid var(--border-bright);background:var(--bg-card);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.daily-check.done{background:var(--green);border-color:var(--green);}
.ml-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:5px;margin-top:8px;}
.ml-pip{padding:6px 4px;border:1px solid var(--border);border-radius:3px;background:var(--bg-card);text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
.ml-pip:hover{border-color:var(--border-bright);}
.ml-pip.done{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);}
.ml-pip-num{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text-muted);}
.ml-pip.done .ml-pip-num{color:var(--cyan);}
.ml-pip-label{font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.2;}
.ml-pip.done .ml-pip-label{color:var(--cyan-dim);}
.week-step{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .2s;user-select:none;margin-bottom:5px;}
.week-step:hover{border-color:var(--border-bright);background:var(--bg-hover);}
.week-step.done{opacity:.3;}
.week-step.done .week-text{text-decoration:line-through;color:var(--text-muted);}
.week-num{font-family:'Cinzel',serif;font-size:13px;color:var(--orange);font-weight:700;min-width:24px;margin-top:1px;}
.week-text{flex:1;font-size:14px;font-weight:500;line-height:1.4;}
.week-why{font-size:11px;color:var(--text-muted);margin-top:3px;}
.gil-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.gil-method{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;user-select:none;transition:all .15s;margin-bottom:4px;}
.gil-method:hover{border-color:var(--border-bright);}
.gil-method.done{opacity:.35;}
.gil-method.done .gil-text{text-decoration:line-through;color:var(--text-muted);}
.gil-text{flex:1;font-size:13px;font-weight:500;}
.gil-est{font-size:11px;color:var(--green);font-weight:600;}
.tier-tag{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;border:1px solid;flex-shrink:0;}
.tier-1{background:rgba(74,200,138,.1);border-color:var(--green-dim);color:var(--green);}
.tier-2{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);color:var(--cyan);}
</style>

<div class="app" id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>

const { useState, useCallback, useEffect } = React;
const e = React.createElement;

// ── THEME SYSTEM ─────────────────────────────────────────────────────

// ── COALITIONS ───────────────────────────────────────────────────────

  { ml: 45, note: 'Job ability unlock' },
  { ml: 50, note: 'MAX' },

// ── THIS WEEK STEPS ──────────────────────────────────────────────────

const SK = 'ffxi_v5';
function load() { try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {} return null; }
function persist(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch(e) {} }

function calcTimer(start) {
  if (!start) return { days: 0, pct: 0, remaining: 180 };
  const d = Math.floor((new Date() - new Date(start)) / 86400000);
  const days = Math.max(0, Math.min(d, 180));
  return { days, pct: Math.round(days / 180 * 100), remaining: Math.max(0, 180 - days) };
}

  mogGardenRank: 1, masterLevel: 0,

function reducer(s, a) {
  switch(a.t) {
    case 'SET': return {...s, [a.k]: a.v};
    case 'THEME': return {...s, theme: a.v};
    case 'COALITION': return {...s, coalitions: {...s.coalitions, [a.id]: a.v}};
    case 'IMP': return {...s, imprimaturs: {...s.imprimaturs, [a.i]: !s.imprimaturs[a.i]}};
    case 'DELVE': return {...s, delves: {...s.delves, [a.id]: !s.delves[a.id]}};
    case 'GEO_GEAR': return {...s, geoGear: {...s.geoGear, [a.id]: !s.geoGear[a.id]}};
    case 'SHARED_GEAR': return {...s, sharedGear: {...s.sharedGear, [a.id]: !s.sharedGear[a.id]}};
    case 'GEO_SKILL': return {...s, geoSkills: {...s.geoSkills, [a.k]: a.v}};
    case 'SPELL': return {...s, spells: {...s.spells, [a.job]: {...s.spells[a.job], [a.id]: !s.spells[a.job]?.[a.id]}}};
    case 'DAILY': return {...s, dailyDone: {...s.dailyDone, [a.id]: !s.dailyDone[a.id]}};
    case 'EVENT_TASK': return {...s, eventDone: {...s.eventDone, [a.id]: !s.eventDone[a.id]}};
    case 'WEEK': return {...s, weekDone: {...s.weekDone, [a.id]: !s.weekDone[a.id]}};
    case 'GIL': return {...s, gilDone: {...s.gilDone, [a.id]: !s.gilDone[a.id]}};
    case 'RESET_DAILY': return {...s, dailyDone: {}};
    default: return s;
  }
}

// ── EVENTS TAB ───────────────────────────────────────────────────────
function EventsTab({ s, d }) {
  return e('div', null,
    e('div', { className: 'text-dim section-gap' }, 'Today: May 27, 2026. Click tasks to mark complete.'),
    EVENTS.map(ev => {
      const days = daysLeft(ev.ends);
      const cls = days <= 7 ? 'urgent' : days <= 20 ? 'soon' : 'ok';
      const done = ev.tasks.filter(t => s.eventDone?.[t.id]).length;
      return e('div', { key: ev.id, className: 'event-card ' + (days <= 7 ? 'urgent' : days <= 20 ? 'active' : '') },
        e('div', { className: 'event-header' },
          e('div', null,
            e('div', { className: 'event-name' }, ev.name),
            e('div', { className: 'text-dim', style: { marginTop: 2 } }, 'Ends: ' + ev.ends + ' (' + days + ' days)  |  ' + done + ' / ' + ev.tasks.length + ' tasks')
          ),
          e('span', { className: 'event-countdown ' + cls }, days + ' DAYS')
        ),
        e('div', { className: 'event-desc' }, ev.desc),
        e('div', { className: 'event-rec' }, '★ ' + ev.rec),
        e('div', { className: 'event-tasks' },
          ev.tasks.map(t => {
            const td = s.eventDone?.[t.id] || false;
            return e('div', { key: t.id, className: 'itin-task' + (td ? ' done' : ''), onClick: () => d({ t: 'EVENT_TASK', id: t.id }) },
              e(DotCheck, { done: td }),
              e('span', { className: 'itin-task-text' }, t.text)
            );
          })
        )
      );
    })
  );
}

// ── IDRIS TAB ────────────────────────────────────────────────────────

    e('div', { className: 'grid-2 section-gap' },
      e('div', { className: 'panel' },
        e('div', { className: 'panel-title' }, '6-Month Timer'),
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 16, marginBottom: 14 } },
          e('div', { style: { background: 'var(--bg-card)', border: '1px solid var(--border-bright)', borderRadius: 4, padding: '12px 18px', textAlign: 'center', minWidth: 145 } },
            e('div', { className: 'text-dim' }, t.remaining > 0 ? 'Days Remaining' : 'COMPLETE'),
            e('div', { style: { fontFamily: "'Cinzel',serif", fontSize: 34, color: 'var(--orange)', fontWeight: 700, lineHeight: 1.1 } }, t.remaining > 0 ? t.remaining : '✓'),
            e('div', { className: 'text-dim', style: { marginTop: 4 } }, t.days + ' / 180 elapsed')
          ),
          e('div', { style: { flex: 1 } },
            e('div', { className: 'bl' }, e('span', null, 'Progress'), e('span', null, t.pct + '%')),
            e(PBar, { pct: t.pct, cls: 'bar-orange' }),
            e('div', { className: 'text-dim', style: { marginTop: 6 } }, t.remaining > 0 ? 'Est. complete: Nov 22, 2026' : 'Timer expired -- forge Idris!')
          )
        ),
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, paddingTop: 10, borderTop: '1px solid var(--border)' } },
          e('label', { className: 'text-dim' }, 'Timer Start:'),
          e('input', { type: 'date', className: 'date-input', value: s.idrisStart || '', onChange: ev => d({ t: 'SET', k: 'idrisStart', v: ev.target.value }) })
        )
      ),
      e('div', { className: 'panel' },
        e('div', { className: 'panel-title' }, 'Imprimatur Tracker'),
        e('div', { className: 'text-dim', style: { marginBottom: 8 } }, 'Regen: 1 per 3 hrs  |  Cap: 15  |  Available: ' + available + '  |  Spent: ' + (15 - available)),
        e('div', { className: 'imp-grid' },
          Array.from({ length: 15 }, (_, i) => {
            const av = s.imprimaturs?.[i] || false;
            return e('div', { key: i, className: 'imp-cell ' + (av ? 'available' : 'spent'), onClick: () => d({ t: 'IMP', i }) }, av ? '❆' : '✗');
          })
        ),
        e(PBar, { pct: Math.round(available/15*100), cls: 'bar-cyan' }),
        e('div', { className: 'text-dim', style: { marginTop: 6 } }, 'Click cells to toggle available / spent')
      )
    ),
    e('div', { className: 'panel section-gap' },
      e('div', { className: 'panel-title' }, 'Coalition Ranks -- Target: All Legend'),
      e('table', { className: 'coal-table' },
        e('thead', null, e('tr', null, ['Coalition','Rank','Progress','Status'].map(h => e('th', { key: h }, h)))),
        e('tbody', null, COALITIONS.map(c => {
          const rank = s.coalitions[c.id] || 0;
          const names = ['None','Initiate','Novice','Journeyman','Adept','Legend'];
          return e('tr', { key: c.id },
            e('td', null, c.name),
            e('td', null, e('select', { className: 'rank-select', value: rank, onChange: ev => d({ t: 'COALITION', id: c.id, v: parseInt(ev.target.value) }) },
              names.map((n, i) => e('option', { key: i, value: i }, i + ' - ' + n))
            )),
            e('td', null, Array.from({ length: 5 }, (_, i) => e('span', { key: i, className: 'rank-pip' + (i < rank ? (rank >= 5 ? ' legend' : ' filled') : '') }))),
            e('td', null, e('span', { style: { fontSize: 12, color: rank >= 5 ? 'var(--gold)' : 'var(--text-muted)' } }, rank >= 5 ? 'LEGEND' : names[rank]))
          );
        }))
      )
    ),
    e('div', { className: 'grid-2 section-gap' },
      e('div', { className: 'panel' },
        e('div', { className: 'panel-title' }, 'Resources'),
        e('div', { className: 'num-row' },
          e('span', { className: 'num-label' }, 'High-Purity Bayld'),
          e('input', { type: 'number', className: 'num-input', value: s.bayld||0, onChange: ev => d({ t: 'SET', k: 'bayld', v: parseInt(ev.target.value)||0 }) }),
          e('span', { className: 'num-target' }, '/ 13,099')
        ),
        e(PBar, { pct: Math.min(100, Math.round((s.bayld||0)/13099*100)), cls: 'bar-cyan', style: { marginBottom: 12 } }),
        e('div', { className: 'num-row' },
          e('span', { className: 'num-label' }, 'Mamuetum Plasm'),
          e('input', { type: 'number', className: 'num-input', value: s.plasm||0, onChange: ev => d({ t: 'SET', k: 'plasm', v: parseInt(ev.target.value)||0 }) }),
          e('span', { className: 'num-target' }, '/ 2,500,000')
        ),
        e(PBar, { pct: Math.min(100, Math.round((s.plasm||0)/2500000*100)), cls: 'bar-purple' })
      ),
      e('div', { className: 'panel' },
        e('div', { className: 'panel-title' }, 'Delve Mega-Boss Titles'),
        e('div', { className: 'checklist' },
          DELVE_TITLES.map(dt => e(Chk, { key: dt.id, label: dt.name, note: dt.zone, done: s.delves[dt.id]||false, onToggle: () => d({ t: 'DELVE', id: dt.id }) }))
        )
      )
    )
  );
}

// ── GEO TAB ──────────────────────────────────────────────────────────
function GeoTab({ s, d }) {
  const [sub, setSub] = useState('gear');
  const geo = s.geoSkills || { geo: 0, bell: 0 };
  const combined = (geo.geo||0) + (geo.bell||0);
  const pct = Math.min(100, Math.round(combined/900*100));

  const gearTiers = [
    { key: 'event', label: 'Event / Limbus Gear (Do First)', tier: 'event', items: GEO_GEAR.event },
    { key: 'mid', label: 'Mid-Tier', tier: 'mid', items: GEO_GEAR.mid },
    { key: 'roe', label: 'RoE Intermediate 2 (Free Shortcuts)', tier: 'mid', items: GEO_GEAR.roe },
    { key: 'max', label: 'Max Duration', tier: 'max', items: GEO_GEAR.max },
    { key: 'luopan', label: 'Luopan Survival + Nuke', tier: 'luopan', items: GEO_GEAR.luopan },
  ];

  return e('div', null,
    e('div', { className: 'panel section-gap' },
      e('div', { className: 'panel-title' }, 'Combined Skill Target: 900'),
      e('div', { className: 'bl' }, e('span', null, 'Combined: ' + combined + ' / 900'), e('span', null, pct + '%')),
      e(PBar, { pct, cls: combined >= 900 ? 'bar-green' : 'bar-cyan', style: { marginBottom: 14 } }),
      e('div', { className: 'grid-2' },
        ['geo','bell'].map(k => e('div', { key: k },
          e('div', { className: 'num-row' },
            e('span', { className: 'num-label' }, k === 'geo' ? 'Geomancy Skill' : 'Handbell Skill'),
            e('input', { type: 'number', className: 'num-input', value: geo[k]||0, onChange: ev => d({ t: 'GEO_SKILL', k, v: parseInt(ev.target.value)||0 }) }),
            e('span', { className: 'num-target' }, '/ ~450')
          ),
          e(PBar, { pct: Math.min(100, Math.round(((geo[k]||0)/450)*100)), cls: k==='geo'?'bar-cyan':'bar-purple' })
        ))
      )
    ),
    e('div', { className: 'panel' },
      e('div', { className: 'sub-tabs' },
        [{ id:'gear',label:'GEO Gear'},{ id:'shared',label:'Shared Gear'}].map(st =>
          e('button', { key: st.id, className: 'sub-tab' + (sub === st.id ? ' active' : ''), onClick: () => setSub(st.id) }, st.label)
        )
      ),
      sub === 'gear' && e('div', { className: 'scroll-list' },
        gearTiers.map(t => e('div', { key: t.key },
          e('div', { className: 'spell-section-label' }, t.label),
          e('div', { className: 'checklist' },
            t.items.map(g => e(Chk, {
              key: g.id, label: g.name, note: g.note,
              source: g.slot + (g.source ? ' -- ' + g.source : ''),
              tier: t.tier, done: s.geoGear[g.id]||false,
              onToggle: () => d({ t: 'GEO_GEAR', id: g.id })
            }))
          )
        ))
      ),
      sub === 'shared' && e('div', { className: 'scroll-list' },
        e('div', { className: 'text-dim', style: { marginBottom: 10 } }, 'High-value gear shared across multiple jobs. Farming any of these advances your whole roster simultaneously.'),
        Object.entries(SHARED_GEAR).map(([section, items]) => e('div', { key: section },
          e('div', { className: 'spell-section-label' }, section),
          e('div', { className: 'checklist' },
            items.map(g => e(Chk, {
              key: g.id, label: g.name, note: g.note,
              source: g.slot + ' -- ' + g.source,
              tier: 'shared', jobs: g.jobs,
              done: s.sharedGear[g.id]||false,
              onToggle: () => d({ t: 'SHARED_GEAR', id: g.id })
            }))
          )
        ))
      )
    )
  );
}

// ── SPELLS TAB ───────────────────────────────────────────────────────
function SpellsTab({ s, d }) {
  const [job, setJob] = useState('GEO');
  const jobData = SPELLS[job] || {};
  const totalSpells = Object.values(jobData).flat().length;
  const ownedSpells = Object.values(jobData).flat().filter(sp => s.spells?.[job]?.[sp.id]).length;
  const colors = { GEO: 'var(--cyan)', RDM: '#e87090', WHM: 'var(--green)', BRD: '#a870e8' };

  return e('div', null,
    e('div', { className: 'panel' },
      e('div', { className: 'flex-row', style: { marginBottom: 12 } },
        e('div', { className: 'panel-title', style: { margin: 0, flex: 1 } }, 'Spell / Song Library'),
        e('span', { className: 'text-dim' }, ownedSpells + ' / ' + totalSpells + ' owned')
      ),
      e('div', { className: 'sub-tabs' },
        ['GEO','RDM','WHM','BRD'].map(j => e('button', {
          key: j, className: 'sub-tab' + (job === j ? ' active' : ''),
          style: job === j ? { color: colors[j], borderBottomColor: colors[j] } : {},
          onClick: () => setJob(j)
        }, j + (j === 'BRD' ? ' (Songs)' : ' (Spells)')))
      ),
      e(PBar, { pct: totalSpells > 0 ? Math.round(ownedSpells/totalSpells*100) : 0, cls: 'bar-cyan', style: { marginBottom: 14 } }),
      e('div', { className: 'scroll-list', style: { maxHeight: 500 } },
        Object.entries(jobData).map(([section, spells]) => e('div', { key: section },
          e('div', { className: 'spell-section-label' }, section),
          e('div', { className: 'spell-grid' },
            spells.map(sp => {
              const owned = s.spells?.[job]?.[sp.id] || false;
              return e('div', { key: sp.id, className: 'spell-item' + (owned ? ' owned' : ''), onClick: () => d({ t: 'SPELL', job, id: sp.id }) },
                e('div', { className: 'spell-dot', style: { background: owned ? 'var(--green)' : 'transparent', borderColor: owned ? 'var(--green)' : colors[job] } }),
                e('span', { className: 'spell-name' }, sp.name),
                e('span', { className: 'spell-lvl' }, 'L' + sp.lvl + (sp.note ? ' -- ' + sp.note : ''))
              );
            })
          )
        ))
      )
    )
  );
}

// ── ITINERARY TAB ────────────────────────────────────────────────────
function ItineraryTab({ s, d }) {
  const allTasks = ITINERARY.flatMap(b => b.tasks);
  const doneCt = allTasks.filter(t => s.dailyDone[t.id]).length;
  const labels = { must: 'MUST', should: 'SHOULD', can: 'CAN' };

  return e('div', null,
    e('div', { className: 'flex-row section-gap', style: { justifyContent: 'space-between' } },
      e('div', null,
        e('div', { className: 'text-dim' }, 'Today: ' + new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })),
        e('div', { className: 'text-dim', style: { marginTop: 2 } }, doneCt + ' / ' + allTasks.length + ' tasks complete')
      ),
      e('button', { className: 'btn-ghost', onClick: () => d({ t: 'RESET_DAILY' }) }, 'Reset Daily')
    ),
    e(PBar, { pct: Math.round(doneCt/allTasks.length*100), cls: 'bar-green', style: { marginBottom: 16 } }),
    ITINERARY.map(block => e('div', { key: block.time + block.title, className: 'itin-block' },
      e('div', { className: 'itin-header' },
        e('span', { className: 'itin-time' }, block.time),
        e('span', { className: 'itin-title' }, block.title),
        e('span', { className: 'itin-where' }, block.where)
      ),
      e('div', { className: 'itin-tasks' },
        block.tasks.map(t => {
          const done = s.dailyDone[t.id] || false;
          return e('div', { key: t.id, className: 'itin-task' + (done ? ' done' : ''), onClick: () => d({ t: 'DAILY', id: t.id }) },
            e(DotCheck, { done }),
            e('span', { className: 'itin-task-text' }, t.text),
            e('span', { className: 'itin-priority p-' + t.priority }, labels[t.priority])
          );
        })
      )
    ))
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────
const TABS = [
  { id: 'overview', label: 'Overview' },
  { id: 'events', label: 'Events' },
  { id: 'idris', label: 'Idris Timer' },
  { id: 'geo', label: 'GEO Tracker' },
  { id: 'spells', label: 'Spells / Songs' },
  { id: 'itinerary', label: 'Daily Itinerary' },
  { id: 'ffxiv', label: 'FFXIV', disabled: true },
];

function App() {
  const [tab, setTab] = useState('overview');
  const [st, setSt] = useState(() => load() || INIT);
  const [saved, setSaved] = useState('');
  const dispatch = useCallback(a => setSt(s => reducer(s, a)), []);

  useEffect(() => {
    const themeObj = THEMES.find(t => t.id === (st.theme || 'dark'));
    document.body.className = themeObj ? themeObj.cls : '';
  }, [st.theme]);

  function doSave() { persist(st); setSaved('Saved!'); setTimeout(() => setSaved(''), 2000); }

  const urgentCount = EVENTS.filter(ev => daysLeft(ev.ends) <= 7).length;
  const tp = { s: st, d: dispatch };

  return e('div', { className: 'app' },
    e('div', { className: 'header' },
      e('div', { className: 'header-left' },
        e('h1', null, 'FFXI PROGRESSION TRACKER'),
        e('p', null, "GEO / BRD Endgame Roadmap -- 2026 Meta")
      ),
      e('div', { className: 'theme-switcher' },
        e('span', { className: 'theme-label' }, 'Theme'),
        THEMES.map(t => e('button', {
          key: t.id,
          className: 'theme-btn ' + t.btnCls + (st.theme === t.id ? ' active' : ''),
          title: t.label,
          onClick: () => dispatch({ t: 'THEME', v: t.id })
        }))
      )
    ),
    e('div', { className: 'nav-tabs' },
      TABS.map(t => e('button', {
        key: t.id,
        className: 'nav-tab' + (tab === t.id ? ' active' : '') + (t.disabled ? ' disabled' : '') + (t.id === 'events' && urgentCount > 0 ? ' urgent' : ''),
        onClick: () => !t.disabled && setTab(t.id)
      },
        t.label,
        t.id === 'events' && urgentCount > 0 && e('span', { style: { marginLeft: 5, fontSize: 10, background: 'var(--red)', borderRadius: '50%', padding: '1px 6px', color: '#fff', fontWeight: 700 } }, urgentCount),
        t.disabled && e('span', { className: 'tag-cs', style: { marginLeft: 6 } }, 'SOON')
      ))
    ),
    tab === 'overview' && e(OverviewTab, tp),
    tab === 'events' && e(EventsTab, tp),
    tab === 'idris' && e(IdrisTab, tp),
    tab === 'geo' && e(GeoTab, tp),
    tab === 'spells' && e(SpellsTab, tp),
    tab === 'itinerary' && e(ItineraryTab, tp),
    e('div', { className: 'save-bar' },
      saved ? e('span', { className: 'save-status' }, saved) : e('span', null, 'Click Save to persist'),
      e('button', { className: 'save-btn', onClick: doSave }, 'Save')
    )
  );
}

ReactDOM.render(e(App), document.getElementById('root'));

</script>
</body>
