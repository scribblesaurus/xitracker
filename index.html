<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXI Progression Tracker v6 -- Dual Profile</title>
<!--
  FFXI Progression Tracker v6
  Profiles: Scribble (GEO/BRD) + Ragelog (COR)
  Storage key: ffxi_v6
  Reset: localStorage.removeItem('ffxi_v6') in browser console
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Exo+2:wght@400;500;600;700&display=swap');
:root{
  --bg-deep:#0a0c10;--bg-panel:#0f1218;--bg-card:#141820;--bg-hover:#1c2230;
  --border:#1e2535;--border-bright:#2a3550;
  --gold:#c8a84b;--gold-dim:#7a6430;--gold-glow:rgba(200,168,75,0.15);
  --cyan:#4ab8c8;--cyan-dim:#2a6878;--green:#4ac88a;--green-dim:#2a6845;
  --red:#c84a4a;--red-dim:#7a2a2a;--purple:#8a4ac8;--orange:#e8853a;
  --text-primary:#f0e8d8;--text-secondary:#90a8c0;--text-muted:#556070;
}
.theme-midnight{--bg-deep:#050810;--bg-panel:#080d18;--bg-card:#0c1220;--bg-hover:#101828;--border:#162030;--border-bright:#203050;--gold:#60c8f0;--gold-dim:#2a6890;--gold-glow:rgba(96,200,240,0.15);--text-primary:#ffffff;--text-secondary:#a0c0e0;--text-muted:#506080;}
.theme-parchment{--bg-deep:#f5f0e8;--bg-panel:#ede8dc;--bg-card:#e5dfd0;--bg-hover:#ddd8c8;--border:#c8c0a8;--border-bright:#b0a890;--gold:#7a4a10;--gold-dim:#a06820;--gold-glow:rgba(122,74,16,0.12);--cyan:#2a6878;--cyan-dim:#4a90a8;--green:#2a6838;--green-dim:#4a9060;--red:#883020;--red-dim:#b05030;--orange:#a05018;--text-primary:#2a2018;--text-secondary:#5a4830;--text-muted:#8a7860;}
.theme-teal{--bg-deep:#060d0c;--bg-panel:#0a1512;--bg-card:#0e1c18;--bg-hover:#122420;--border:#163028;--border-bright:#204838;--gold:#40d8a8;--gold-dim:#207850;--gold-glow:rgba(64,216,168,0.15);--cyan:#60e8c0;--cyan-dim:#308860;--green:#80f0a0;--green-dim:#3a8050;--text-primary:#e8f8f0;--text-secondary:#80c0a8;--text-muted:#406850;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Exo 2',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;font-size:16px;line-height:1.5;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,168,75,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 20px 70px;}

/* HEADER */
.header{padding:22px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.header-left h1{font-family:'Cinzel',serif;font-size:21px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-shadow:0 0 30px var(--gold-glow);}
.header-left p{font-size:12px;color:var(--text-muted);letter-spacing:.05em;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}

/* PROFILE SWITCHER */
.profile-switcher{display:flex;gap:2px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:3px;}
.profile-btn{padding:5px 14px;border-radius:3px;border:none;background:none;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--text-muted);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.profile-btn:hover{color:var(--text-primary);}
.profile-btn.active{background:var(--bg-panel);border:1px solid var(--border-bright);color:var(--gold);}
.profile-job{font-size:10px;color:var(--text-muted);display:block;margin-top:1px;font-weight:400;letter-spacing:.05em;}

/* THEME */
.theme-switcher{display:flex;gap:5px;align-items:center;}
.theme-label{font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;}
.theme-btn{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;}
.theme-btn:hover{transform:scale(1.15);}
.theme-btn.active{border-color:var(--text-primary);}
.theme-dark{background:linear-gradient(135deg,#0a0c10 50%,#c8a84b 50%);}
.theme-mid{background:linear-gradient(135deg,#080d18 50%,#60c8f0 50%);}
.theme-parch{background:linear-gradient(135deg,#f5f0e8 50%,#7a4a10 50%);}
.theme-tl{background:linear-gradient(135deg,#060d0c 50%,#40d8a8 50%);}

/* NAV */
.nav-tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border);flex-wrap:wrap;}
.nav-tab{padding:9px 16px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--text-secondary);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;margin-bottom:-2px;}
.nav-tab:hover{color:var(--text-primary);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-tab.disabled{opacity:.4;cursor:not-allowed;}
.nav-tab.urgent{color:var(--red)!important;border-bottom-color:var(--red)!important;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* LAYOUT */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:1000px){.grid-2{grid-template-columns:1fr;}}
.section-gap{margin-bottom:16px;}
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;padding:18px;}
.panel-title{font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent);}

/* BARS */
.bar-track{height:7px;background:var(--bg-card);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.bar-orange{background:linear-gradient(90deg,var(--gold-dim),var(--orange));}
.bar-cyan{background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));}
.bar-green{background:linear-gradient(90deg,var(--green-dim),var(--green));}
.bar-purple{background:linear-gradient(90deg,#5a3080,var(--purple));}
.bar-gold{background:linear-gradient(90deg,var(--gold-dim),var(--gold));}
.bar-red{background:linear-gradient(90deg,var(--red-dim),var(--red));}
.bar-gil{background:linear-gradient(90deg,#5a4010,#e8c040);}
.bar-cor{background:linear-gradient(90deg,#802010,#e84010);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:14px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:11px 13px;}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.stat-value{font-family:'Cinzel',serif;font-size:19px;color:var(--gold);font-weight:600;line-height:1.2;}
.stat-value.cyan{color:var(--cyan);}.stat-value.green{color:var(--green);}.stat-value.orange{color:var(--orange);}.stat-value.red{color:var(--red);}
.stat-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}
.bl{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px;}

/* CHECKLIST */
.checklist{display:flex;flex-direction:column;gap:5px;}
.check-item{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .2s;user-select:none;}
.check-item:hover{border-color:var(--border-bright);background:var(--bg-hover);}
.check-item.done{opacity:.35;}
.check-item.done .check-name{text-decoration:line-through;color:var(--text-muted);}
.checkbox{width:16px;height:16px;border-radius:2px;border:1px solid var(--border-bright);background:var(--bg-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.checkbox.checked{background:var(--green);border-color:var(--green);}
.check-name{flex:1;font-size:13px;font-weight:500;}
.check-note{font-size:11px;color:var(--text-muted);}
.check-source{font-size:10px;color:var(--text-muted);background:var(--bg-deep);border-radius:2px;padding:1px 5px;border:1px solid var(--border);white-space:nowrap;}
.check-jobs{font-size:10px;color:var(--cyan);background:rgba(74,184,200,.08);border:1px solid var(--cyan-dim);border-radius:2px;padding:1px 5px;white-space:nowrap;flex-shrink:0;}
.tier-badge{font-size:9px;padding:2px 4px;border-radius:2px;font-weight:700;letter-spacing:.05em;border:1px solid;flex-shrink:0;}
.tier-event{background:rgba(232,133,58,.1);border-color:#804a20;color:var(--orange);}
.tier-mid{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);color:var(--cyan);}
.tier-max{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.tier-luopan{background:rgba(138,74,200,.1);border-color:#5a3080;color:#a870e8;}
.tier-shared{background:rgba(74,184,200,.08);border-color:var(--cyan-dim);color:var(--cyan);}
.tier-cor{background:rgba(232,64,16,.1);border-color:#802010;color:#e84010;}
.tier-key{background:rgba(200,168,75,.15);border-color:var(--gold-dim);color:var(--gold);}

/* SUB-TABS */
.sub-tabs{display:flex;gap:2px;margin-bottom:13px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sub-tab{padding:6px 14px;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.sub-tab:hover{color:var(--text-primary);}
.sub-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* SPELL GRID */
.spell-section-label{font-size:10px;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;margin:12px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.spell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:5px;}
.spell-item{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.spell-item:hover{border-color:var(--border-bright);}
.spell-item.owned{opacity:.35;}
.spell-item.owned .spell-name{text-decoration:line-through;color:var(--text-muted);}
.spell-dot{width:8px;height:8px;border-radius:50%;border:1px solid;flex-shrink:0;}
.spell-name{flex:1;font-size:13px;font-weight:500;}
.spell-lvl{font-size:11px;color:var(--text-muted);white-space:nowrap;}

/* IMPRIMATUR */
.imp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.imp-cell{aspect-ratio:1;border:1px solid var(--border);border-radius:3px;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.imp-cell.available{background:rgba(74,184,200,.15);border-color:var(--cyan);color:var(--cyan);}
.imp-cell.spent{background:rgba(200,74,74,.1);border-color:#603030;color:#804040;}

/* COALITION */
.coal-table{width:100%;border-collapse:collapse;font-size:13px;}
.coal-table th{text-align:left;padding:7px 9px;font-size:10px;letter-spacing:.1em;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;font-weight:700;}
.coal-table td{padding:7px 9px;border-bottom:1px solid var(--border);}
.coal-table tr:last-child td{border-bottom:none;}
.coal-table tr:hover td{background:var(--bg-hover);}
.rank-select{background:var(--bg-card);border:1px solid var(--border-bright);color:var(--text-primary);border-radius:2px;padding:2px 6px;font-family:'Exo 2',sans-serif;font-size:12px;cursor:pointer;}
.rank-pip{width:11px;height:11px;border-radius:50%;border:1px solid var(--border);background:var(--bg-deep);display:inline-block;margin-right:2px;}
.rank-pip.filled{background:var(--gold);border-color:var(--gold);}
.rank-pip.legend{background:var(--orange);border-color:var(--orange);}

/* ITINERARY */
.itin-block{margin-bottom:13px;}
.itin-header{display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap;}
.itin-time{font-family:'Cinzel',serif;font-size:10px;color:var(--orange);letter-spacing:.1em;min-width:100px;font-weight:600;}
.itin-title{font-size:13px;font-weight:700;color:var(--text-primary);}
.itin-where{font-size:10px;color:var(--cyan);background:rgba(74,184,200,.08);border:1px solid var(--cyan-dim);border-radius:2px;padding:1px 6px;}
.itin-tasks{display:flex;flex-direction:column;gap:4px;padding-left:110px;}
@media(max-width:700px){.itin-tasks{padding-left:0;}}
.itin-task{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;user-select:none;transition:all .15s;}
.itin-task:hover{border-color:var(--border-bright);}
.itin-task.done .itin-task-text{text-decoration:line-through;color:var(--text-muted);}
.itin-task-text{flex:1;font-size:13px;}
.itin-priority{font-size:9px;padding:2px 5px;border-radius:2px;border:1px solid;font-weight:700;letter-spacing:.05em;flex-shrink:0;}
.p-must{background:rgba(200,74,74,.15);border-color:#803030;color:#e87070;}
.p-should{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.p-can{background:rgba(74,85,104,.2);border-color:var(--border);color:var(--text-muted);}

/* INPUTS */
.num-input{width:105px;background:var(--bg-card);border:1px solid var(--border-bright);color:var(--text-primary);border-radius:2px;padding:3px 7px;font-family:'Exo 2',sans-serif;font-size:13px;text-align:right;}
.num-input:focus{outline:none;border-color:var(--gold-dim);}
.date-input{background:var(--bg-card);border:1px solid var(--border-bright);border-radius:2px;color:var(--text-primary);padding:4px 8px;font-family:'Exo 2',sans-serif;font-size:12px;}
.date-input:focus{outline:none;border-color:var(--gold-dim);}
.num-row{display:flex;align-items:center;gap:10px;margin:5px 0;}
.num-label{font-size:12px;color:var(--text-secondary);flex:1;}
.num-target{font-size:11px;color:var(--text-muted);}
.scroll-list{max-height:400px;overflow-y:auto;padding-right:4px;}
.scroll-list::-webkit-scrollbar{width:3px;}
.scroll-list::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:2px;padding:4px 10px;font-family:'Exo 2',sans-serif;font-size:11px;letter-spacing:.07em;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.btn-ghost:hover{border-color:var(--border-bright);color:var(--text-secondary);}

/* SAVE BAR */
.save-bar{position:fixed;bottom:12px;right:12px;display:flex;gap:8px;align-items:center;background:var(--bg-panel);border:1px solid var(--border-bright);border-radius:4px;padding:6px 12px;z-index:100;font-size:11px;color:var(--text-muted);}
.save-btn{background:var(--gold-dim);border:none;color:#fff;border-radius:2px;padding:4px 12px;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;cursor:pointer;text-transform:uppercase;transition:background .15s;}
.save-btn:hover{background:var(--gold);}
.save-status{color:var(--green);font-size:10px;}
.text-dim{color:var(--text-muted);font-size:11px;}
.flex-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tag-cs{font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(74,85,104,.3);border:1px solid var(--border);color:var(--text-muted);letter-spacing:.05em;}

/* EVENTS */
.event-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:13px;margin-bottom:9px;}
.event-card.urgent{border-color:var(--red-dim);}
.event-card.active{border-color:var(--cyan-dim);}
.event-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px;flex-wrap:wrap;}
.event-name{font-size:14px;font-weight:700;color:var(--text-primary);}
.event-countdown{font-family:'Cinzel',serif;font-size:11px;padding:3px 9px;border-radius:2px;border:1px solid;font-weight:700;}
.event-countdown.urgent{background:rgba(200,74,74,.15);border-color:var(--red-dim);color:var(--red);}
.event-countdown.soon{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.event-countdown.ok{background:rgba(74,184,200,.08);border-color:var(--cyan-dim);color:var(--cyan);}
.event-desc{font-size:12px;color:var(--text-secondary);margin-bottom:9px;line-height:1.5;}
.event-rec{font-size:11px;color:var(--orange);background:rgba(232,133,58,.08);border:1px solid rgba(232,133,58,.2);border-radius:2px;padding:4px 8px;margin-bottom:9px;}
.event-tasks{display:flex;flex-direction:column;gap:4px;}
.daily-check{width:13px;height:13px;border-radius:50%;border:1px solid var(--border-bright);background:var(--bg-card);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.daily-check.done{background:var(--green);border-color:var(--green);}

/* ML + WEEK */
.ml-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:5px;margin-top:8px;}
.ml-pip{padding:5px 3px;border:1px solid var(--border);border-radius:3px;background:var(--bg-card);text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
.ml-pip:hover{border-color:var(--border-bright);}
.ml-pip.done{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);}
.ml-pip-num{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--text-muted);}
.ml-pip.done .ml-pip-num{color:var(--cyan);}
.ml-pip-label{font-size:9px;color:var(--text-muted);margin-top:2px;line-height:1.2;}
.ml-pip.done .ml-pip-label{color:var(--cyan-dim);}
.week-step{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .2s;user-select:none;margin-bottom:5px;}
.week-step:hover{border-color:var(--border-bright);background:var(--bg-hover);}
.week-step.done{opacity:.3;}
.week-step.done .week-text{text-decoration:line-through;color:var(--text-muted);}
.week-text{font-size:13px;font-weight:500;line-height:1.4;}
.week-why{font-size:11px;color:var(--text-muted);margin-top:3px;}

/* GIL */
.gil-method{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;user-select:none;transition:all .15s;margin-bottom:4px;}
.gil-method:hover{border-color:var(--border-bright);}
.gil-method.done{opacity:.35;}
.gil-method.done .gil-text{text-decoration:line-through;color:var(--text-muted);}
.gil-text{flex:1;font-size:12px;font-weight:500;}
.gil-note{font-size:10px;color:var(--text-muted);margin-top:2px;}
.gil-est{font-size:11px;color:var(--green);font-weight:600;white-space:nowrap;}
.tier-tag{font-size:9px;padding:1px 4px;border-radius:2px;font-weight:700;border:1px solid;flex-shrink:0;}
.tier-1{background:rgba(74,200,138,.1);border-color:var(--green-dim);color:var(--green);}
.tier-2{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);color:var(--cyan);}

/* COR SPECIFIC */
.roll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:5px;}
.roll-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.roll-item:hover{border-color:var(--border-bright);}
.roll-item.owned{opacity:.35;}
.roll-item.owned .roll-name{text-decoration:line-through;color:var(--text-muted);}
.roll-dot{width:9px;height:9px;border-radius:50%;border:1px solid #e84010;flex-shrink:0;background:transparent;}
.roll-item.owned .roll-dot{background:var(--green);border-color:var(--green);}
.roll-name{flex:1;font-size:13px;font-weight:500;}
.roll-num{font-family:'Cinzel',serif;font-size:11px;color:var(--orange);font-weight:700;white-space:nowrap;}
.roll-note{font-size:10px;color:var(--text-muted);white-space:nowrap;}
</style>
</head>
<body>

const SK = 'ffxi_v6';
function load() { try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {} return null; }
function persist(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch(e) {} }

function calcTimer(start) {
  if (!start) return { days: 0, pct: 0, remaining: 180 };
  const d = Math.floor((new Date() - new Date(start)) / 86400000);
  const days = Math.max(0, Math.min(d, 180));
  return { days, pct: Math.round(days / 180 * 100), remaining: Math.max(0, 180 - days) };
}

function reducer(st, a) {
  const p = st.activeProfile;
  const pd = st[p] || {};
  function setP(patch) { return { ...st, [p]: { ...pd, ...patch } }; }

  switch(a.t) {
    case 'THEME': return { ...st, theme: a.v };
    case 'PROFILE': return { ...st, activeProfile: a.v };
    case 'EVENT_TASK': return { ...st, eventDone: { ...st.eventDone, [a.id]: !st.eventDone[a.id] } };
    case 'DAILY': return { ...st, dailyDone: { ...st.dailyDone, [a.id]: !st.dailyDone[a.id] } };
    case 'RESET_DAILY': return { ...st, dailyDone: {} };
    // Profile-scoped
    case 'SET_P': return setP({ [a.k]: a.v });
    case 'COALITION': return setP({ coalitions: { ...pd.coalitions, [a.id]: a.v } });
    case 'IMP': return setP({ imprimaturs: { ...pd.imprimaturs, [a.i]: !pd.imprimaturs[a.i] } });
    case 'DELVE': return setP({ delves: { ...pd.delves, [a.id]: !pd.delves[a.id] } });
    case 'GEO_GEAR': return setP({ geoGear: { ...pd.geoGear, [a.id]: !pd.geoGear[a.id] } });
    case 'COR_GEAR': return setP({ corGear: { ...pd.corGear, [a.id]: !pd.corGear[a.id] } });
    case 'SHARED_GEAR': return setP({ sharedGear: { ...pd.sharedGear, [a.id]: !pd.sharedGear[a.id] } });
    case 'GEO_SKILL': return setP({ geoSkills: { ...pd.geoSkills, [a.k]: a.v } });
    case 'SPELL': return setP({ spells: { ...pd.spells, [a.job]: { ...(pd.spells||{})[a.job], [a.id]: !((pd.spells||{})[a.job]||{})[a.id] } } });
    case 'ROLL': return setP({ rollsOwned: { ...pd.rollsOwned, [a.id]: !pd.rollsOwned[a.id] } });
    case 'WEEK': return setP({ weekDone: { ...pd.weekDone, [a.id]: !pd.weekDone[a.id] } });
    case 'GIL': return setP({ gilDone: { ...pd.gilDone, [a.id]: !pd.gilDone[a.id] } });
    default: return st;
  }
}

// ── EVENTS TAB ────────────────────────────────────────────────────────
function EventsTab({ st, d }) {

    EVENTS.map(ev => {

      const done = ev.tasks.filter(t => st.eventDone?.[t.id]).length;
      return e('div', { key: ev.id, className: 'event-card ' + (days <= 7 ? 'urgent' : days <= 20 ? 'active' : '') },
        e('div', { className: 'event-header' },

        e('div', { className: 'event-rec' }, '★ ' + ev.rec),
        e('div', { className: 'event-tasks' },

// ── ITINERARY TAB ─────────────────────────────────────────────────────
function ItineraryTab({ st, d }) {
  const allTasks = ITINERARY.flatMap(b => b.tasks);
  const doneCt = allTasks.filter(t => st.dailyDone[t.id]).length;
  const labels = { must: 'MUST', should: 'SHOULD', can: 'CAN' };
  return e('div', null,
    e('div', { className: 'flex-row section-gap', style: { justifyContent: 'space-between' } },
      e('div', null,
        e('div', { className: 'text-dim' }, 'Today: ' + new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })),
        e('div', { className: 'text-dim', style: { marginTop: 2 } }, doneCt + ' / ' + allTasks.length + ' tasks complete -- shared across profiles')
      ),
      e('button', { className: 'btn-ghost', onClick: () => d({ t: 'RESET_DAILY' }) }, 'Reset Daily')
    ),
    e(PBar, { pct: Math.round(doneCt/allTasks.length*100), cls: 'bar-green', style: { marginBottom: 14 } }),
    ITINERARY.map(block => e('div', { key: block.time + block.title, className: 'itin-block' },
      e('div', { className: 'itin-header' },
        e('span', { className: 'itin-time' }, block.time),
        e('span', { className: 'itin-title' }, block.title),
        e('span', { className: 'itin-where' }, block.where)
      ),
      e('div', { className: 'itin-tasks' },
        block.tasks.map(t => {
          const done = st.dailyDone[t.id] || false;
          return e('div', { key: t.id, className: 'itin-task' + (done ? ' done' : ''), onClick: () => d({ t: 'DAILY', id: t.id }) },
            e(DotCheck, { done }),
            e('span', { className: 'itin-task-text' }, t.text),

// ── MAIN APP ──────────────────────────────────────────────────────────
function App() {
  const [st, setSt] = useState(() => load() || INIT);
  const [tab, setTab] = useState('overview');
  const [saved, setSaved] = useState('');
  const dispatch = useCallback(a => setSt(s => reducer(s, a)), []);

  useEffect(() => {
    const themeObj = THEMES.find(t => t.id === (st.theme || 'dark'));
    document.body.className = themeObj ? themeObj.cls : '';
  }, [st.theme]);

  // When switching profiles, reset to overview if current tab doesn't exist on new profile
  function switchProfile(pid) {
    dispatch({ t: 'PROFILE', v: pid });
    const profileTabs = PROFILES[pid].tabs;
    if (!profileTabs.includes(tab)) setTab('overview');
  }

  function doSave() { persist(st); setSaved('Saved!'); setTimeout(() => setSaved(''), 2000); }

  const p = st.activeProfile || 'scribble';
  const profile = PROFILES[p];
  const tabs = profile.tabs;
  const urgentCount = EVENTS.filter(ev => daysLeft(ev.ends) <= 7).length;

  const tp = { st, d: dispatch };

  return e('div', { className: 'app' },
    e('div', { className: 'header' },
      e('div', { className: 'header-left' },
        e('h1', null, 'FFXI PROGRESSION TRACKER'),
        e('p', null, 'Dual Profile -- 2026 Meta')
      ),
      e('div', { className: 'header-right' },
        // Profile switcher
        e('div', { className: 'profile-switcher' },
          Object.entries(PROFILES).map(([pid, prof]) =>
            e('button', {
              key: pid,
              className: 'profile-btn' + (p === pid ? ' active' : ''),
              onClick: () => switchProfile(pid)
            },
              prof.name,
              e('span', { className: 'profile-job', style: { color: p === pid ? prof.color : '' } }, prof.job)
            )
          )
        ),
        // Theme switcher
        e('div', { className: 'theme-switcher' },
          e('span', { className: 'theme-label' }, 'Theme'),
          THEMES.map(t => e('button', {
            key: t.id,
            className: 'theme-btn ' + t.btnCls + (st.theme === t.id ? ' active' : ''),
            title: t.label,
            onClick: () => dispatch({ t: 'THEME', v: t.id })
          }))
        )
      )
    ),
    // Nav tabs -- profile-specific
    e('div', { className: 'nav-tabs' },
      tabs.map(tid => e('button', {
        key: tid,
        className: 'nav-tab' + (tab === tid ? ' active' : '') + (tid === 'ffxiv' ? ' disabled' : '') + (tid === 'events' && urgentCount > 0 ? ' urgent' : ''),
        onClick: () => tid !== 'ffxiv' && setTab(tid)
      },
        TAB_LABELS[tid],
        tid === 'events' && urgentCount > 0 && e('span', { style: { marginLeft: 5, fontSize: 9, background: 'var(--red)', borderRadius: '50%', padding: '1px 5px', color: '#fff', fontWeight: 700 } }, urgentCount),
        tid === 'ffxiv' && e('span', { className: 'tag-cs', style: { marginLeft: 5 } }, 'SOON')
      ))
    ),
    // Tab content
    tab === 'overview' && e(OverviewTab, tp),
    tab === 'events' && e(EventsTab, tp),
    tab === 'idris' && e(IdrisTab, tp),
    tab === 'geo' && e(GeoTab, tp),
    tab === 'spells' && e(SpellsTab, tp),
    tab === 'cor' && e(CorTab, tp),
    tab === 'rolls' && e(RollsTab, tp),
    tab === 'itinerary' && e(ItineraryTab, tp),
    e('div', { className: 'save-bar' },
      saved ? e('span', { className: 'save-status' }, saved) : e('span', null, 'Click Save to persist'),
      e('button', { className: 'save-btn', onClick: doSave }, 'Save')
    )
  );
}

ReactDOM.render(e(App), document.getElementById('root'));

</script>
