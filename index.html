<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap');
:root{

  --gold:#c8a84b;--gold-dim:#7a6430;--gold-glow:rgba(200,168,75,0.15);
  --cyan:#4ab8c8;--cyan-dim:#2a6878;--green:#4ac88a;--green-dim:#2a6845;
  --red:#c84a4a;--red-dim:#7a2a2a;--purple:#8a4ac8;--orange:#e8853a;
  --text-primary:#e8e0d0;--text-secondary:#8090a8;--text-muted:#4a5568;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;font-size:15px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,168,75,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 16px 60px;}
.header{padding:24px 0 18px;border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-shadow:0 0 30px var(--gold-glow);}
.header p{font-size:12px;color:var(--text-secondary);letter-spacing:.05em;margin-top:2px;}
.job-badges{display:flex;gap:6px;flex-wrap:wrap;}
.job-badge{padding:3px 10px;border-radius:2px;font-size:11px;font-weight:600;letter-spacing:.1em;border:1px solid;}
.badge-geo{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);color:var(--cyan);}
.badge-brd{background:rgba(138,74,200,.1);border-color:#5a3a80;color:#a870e8;}
.badge-war{background:rgba(200,74,74,.1);border-color:#803a3a;color:#e87070;}
.badge-whm{background:rgba(74,200,138,.1);border-color:var(--green-dim);color:var(--green);}
.badge-rdm{background:rgba(200,74,100,.1);border-color:#802040;color:#e87090;}
.nav-tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav-tab{padding:9px 16px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.nav-tab:hover{color:var(--text-primary);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-tab.disabled{opacity:.4;cursor:not-allowed;}
.nav-tab.urgent{color:var(--red)!important;border-bottom-color:var(--red)!important;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:900px){.grid-2{grid-template-columns:1fr;}}
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;padding:18px;}
.panel-title{font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent);}
.section-gap{margin-bottom:16px;}
.bar-track{height:6px;background:var(--bg-card);border-radius:2px;overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.bar-orange{background:linear-gradient(90deg,var(--gold-dim),var(--orange));}
.bar-cyan{background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));}
.bar-green{background:linear-gradient(90deg,var(--green-dim),var(--green));}
.bar-purple{background:linear-gradient(90deg,#5a3080,var(--purple));}
.bar-gold{background:linear-gradient(90deg,var(--gold-dim),var(--gold));}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px 12px;}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.stat-value{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);font-weight:600;}
.stat-value.cyan{color:var(--cyan);}.stat-value.green{color:var(--green);}.stat-value.orange{color:var(--orange);}
.stat-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.bl{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:4px;}
.check-item{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.check-item:hover{border-color:var(--border-bright);background:var(--bg-hover);}
.check-item.done{opacity:.45;}
.check-item.done .check-name{text-decoration:line-through;color:var(--text-muted);}
.checkbox{width:16px;height:16px;border-radius:2px;border:1px solid var(--border-bright);background:var(--bg-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.checkbox.checked{background:var(--green);border-color:var(--green);}
.check-name{flex:1;font-size:13px;font-weight:500;}
.check-note{font-size:11px;color:var(--text-muted);}
.check-source{font-size:10px;color:var(--text-muted);background:var(--bg-deep);border-radius:2px;padding:1px 5px;border:1px solid var(--border);}
.tier-badge{font-size:9px;padding:2px 5px;border-radius:2px;font-weight:700;letter-spacing:.06em;border:1px solid;flex-shrink:0;}
.tier-beginner{background:rgba(74,200,138,.1);border-color:var(--green-dim);color:var(--green);}
.tier-mid{background:rgba(74,184,200,.1);border-color:var(--cyan-dim);color:var(--cyan);}
.tier-max{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.tier-luopan{background:rgba(138,74,200,.1);border-color:#5a3080;color:#a870e8;}
.tier-event{background:rgba(232,133,58,.1);border-color:#804a20;color:var(--orange);}
.sub-tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sub-tab{padding:6px 14px;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.sub-tab:hover{color:var(--text-primary);}
.sub-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.spell-section-label{font-size:10px;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;margin:12px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.spell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:5px;}
.spell-item{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.spell-item:hover{border-color:var(--border-bright);}
.spell-item.owned{opacity:.45;}
.spell-item.owned .spell-name{text-decoration:line-through;color:var(--text-muted);}
.spell-dot{width:8px;height:8px;border-radius:50%;border:1px solid;flex-shrink:0;}
.spell-name{flex:1;font-size:12px;}
.spell-lvl{font-size:10px;color:var(--text-muted);white-space:nowrap;}
.imp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.imp-cell{aspect-ratio:1;border:1px solid var(--border);border-radius:3px;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.imp-cell.available{background:rgba(74,184,200,.15);border-color:var(--cyan);color:var(--cyan);}
.imp-cell.spent{background:rgba(200,74,74,.1);border-color:#603030;color:#804040;}
.coal-table{width:100%;border-collapse:collapse;font-size:12px;}
.coal-table th{text-align:left;padding:7px 9px;font-size:10px;letter-spacing:.1em;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;font-weight:600;}
.coal-table td{padding:7px 9px;border-bottom:1px solid var(--border);}
.coal-table tr:last-child td{border-bottom:none;}
.coal-table tr:hover td{background:var(--bg-hover);}
.rank-select{background:var(--bg-card);border:1px solid var(--border-bright);color:var(--text-primary);border-radius:2px;padding:2px 6px;font-family:'Rajdhani',sans-serif;font-size:12px;cursor:pointer;}
.rank-pip{width:12px;height:12px;border-radius:50%;border:1px solid var(--border);background:var(--bg-deep);display:inline-block;margin-right:2px;}
.rank-pip.filled{background:var(--gold);border-color:var(--gold);}
.rank-pip.legend{background:var(--orange);border-color:var(--orange);}
.itin-block{margin-bottom:14px;}
.itin-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.itin-time{font-family:'Cinzel',serif;font-size:11px;color:var(--orange);letter-spacing:.1em;min-width:90px;}
.itin-title{font-size:13px;font-weight:600;color:var(--text-primary);}
.itin-where{font-size:11px;color:var(--cyan);background:rgba(74,184,200,.08);border:1px solid var(--cyan-dim);border-radius:2px;padding:1px 7px;}
.itin-tasks{display:flex;flex-direction:column;gap:4px;padding-left:100px;}

.itin-task{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;cursor:pointer;user-select:none;transition:all .15s;}
.itin-task:hover{border-color:var(--border-bright);}
.itin-task.done .itin-task-text{text-decoration:line-through;color:var(--text-muted);}
.itin-task-text{flex:1;font-size:12px;}
.itin-priority{font-size:9px;padding:1px 5px;border-radius:2px;border:1px solid;font-weight:700;letter-spacing:.05em;flex-shrink:0;}
.p-must{background:rgba(200,74,74,.15);border-color:#803030;color:#e87070;}
.p-should{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.p-can{background:rgba(74,85,104,.2);border-color:var(--border);color:var(--text-muted);}

.num-input:focus{outline:none;border-color:var(--gold-dim);}
.date-input{background:var(--bg-card);border:1px solid var(--border-bright);border-radius:2px;color:var(--text-primary);padding:4px 8px;font-family:'Rajdhani',sans-serif;font-size:12px;}
.date-input:focus{outline:none;border-color:var(--gold-dim);}
.num-row{display:flex;align-items:center;gap:10px;margin:5px 0;}
.num-label{font-size:12px;color:var(--text-secondary);flex:1;}
.num-target{font-size:11px;color:var(--text-muted);}
.scroll-list{max-height:380px;overflow-y:auto;padding-right:4px;}
.scroll-list::-webkit-scrollbar{width:3px;}
.scroll-list::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:2px;padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.08em;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.btn-ghost:hover{border-color:var(--border-bright);color:var(--text-secondary);}
.save-bar{position:fixed;bottom:12px;right:12px;display:flex;gap:8px;align-items:center;background:var(--bg-panel);border:1px solid var(--border-bright);border-radius:4px;padding:7px 12px;z-index:100;font-size:11px;color:var(--text-muted);}
.save-btn{background:var(--gold-dim);border:none;color:#fff;border-radius:2px;padding:4px 12px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;cursor:pointer;text-transform:uppercase;transition:background .15s;}
.save-btn:hover{background:var(--gold);}
.save-status{color:var(--green);font-size:10px;}
.text-dim{color:var(--text-muted);font-size:11px;}
.flex-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tag-cs{font-size:9px;padding:1px 6px;border-radius:2px;background:rgba(74,85,104,.3);border:1px solid var(--border);color:var(--text-muted);letter-spacing:.06em;}
.event-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;}
.event-card.urgent{border-color:var(--red-dim);}
.event-card.active{border-color:var(--cyan-dim);}
.event-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.event-name{font-size:14px;font-weight:600;color:var(--text-primary);}
.event-countdown{font-family:'Cinzel',serif;font-size:12px;padding:3px 10px;border-radius:2px;border:1px solid;font-weight:600;}

.event-countdown.soon{background:rgba(200,168,75,.1);border-color:var(--gold-dim);color:var(--gold);}
.event-countdown.ok{background:rgba(74,184,200,.08);border-color:var(--cyan-dim);color:var(--cyan);}
.event-desc{font-size:12px;color:var(--text-secondary);margin-bottom:10px;}
.event-rec{font-size:11px;color:var(--orange);background:rgba(232,133,58,.08);border:1px solid rgba(232,133,58,.2);border-radius:2px;padding:4px 8px;margin-bottom:10px;}
.event-tasks{display:flex;flex-direction:column;gap:4px;}
.checklist{display:flex;flex-direction:column;gap:5px;}
.daily-check{width:14px;height:14px;border-radius:50%;border:1px solid var(--border-bright);background:var(--bg-card);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.daily-check.done{background:var(--green);border-color:var(--green);}
</style>

const SK = 'ffxi_v3';
function load() { try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch (e) {} return null; }
function persist(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch (e) {} }

function calcTimer(start) {
  if (!start) return { days: 0, pct: 0, remaining: 180 };
  const d = Math.floor((new Date() - new Date(start)) / 86400000);
  const days = Math.max(0, Math.min(d, 180));
  return { days, pct: Math.round(days / 180 * 100), remaining: Math.max(0, 180 - days) };
}

  dailyDone: {}, eventDone: {},
  mogGardenRank: 1, notes: '',
  milestones: { geo99: true, brd99: true, bonanzaUsed: false, mogGarden7: false },
};

function reducer(s, a) {
  switch (a.t) {
    case 'SET': return { ...s, [a.k]: a.v };
    case 'COALITION': return { ...s, coalitions: { ...s.coalitions, [a.id]: a.v } };
    case 'IMP': return { ...s, imprimaturs: { ...s.imprimaturs, [a.i]: !s.imprimaturs[a.i] } };
    case 'DELVE': return { ...s, delves: { ...s.delves, [a.id]: !s.delves[a.id] } };
    case 'GEO_GEAR': return { ...s, geoGear: { ...s.geoGear, [a.id]: !s.geoGear[a.id] } };
    case 'GEO_SKILL': return { ...s, geoSkills: { ...s.geoSkills, [a.k]: a.v } };
    case 'SPELL': return { ...s, spells: { ...s.spells, [a.job]: { ...s.spells[a.job], [a.id]: !s.spells[a.job]?.[a.id] } } };
    case 'DAILY': return { ...s, dailyDone: { ...s.dailyDone, [a.id]: !s.dailyDone[a.id] } };
    case 'EVENT_TASK': return { ...s, eventDone: { ...s.eventDone, [a.id]: !s.eventDone[a.id] } };
    case 'RESET_DAILY': return { ...s, dailyDone: {} };
    case 'MILESTONE': return { ...s, milestones: { ...s.milestones, [a.k]: a.v } };
    default: return s;
  }
}

    tab === 'events' && e(EventsTab, tp),
    tab === 'idris' && e(IdrisTab, tp),
    tab === 'geo' && e(GeoTab, tp),
    tab === 'spells' && e(SpellsTab, tp),
    tab === 'itinerary' && e(ItineraryTab, tp),
    e('div', { className: 'save-bar' },
      saved ? e('span', { className: 'save-status' }, saved) : e('span', null, 'Click Save to persist'),
      e('button', { className: 'save-btn', onClick: doSave }, 'Save')
    )
  );
}

ReactDOM.render(e(App), document.getElementById('root'));

</script>
</body>
</html>
